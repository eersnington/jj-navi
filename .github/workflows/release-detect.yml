name: Detect Release Publish

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-detect-${{ github.sha }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - name: Detect and dispatch publish workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          semver_re = re.compile(r"^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$")
          repo = os.environ["GITHUB_REPOSITORY"]

          with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as handle:
              event = json.load(handle)
          pr = event.get("pull_request")
          if not isinstance(pr, dict):
              sys.exit("pull_request payload missing")

          def release_branch_version(pr: dict[str, object]) -> str | None:
              if pr.get("merged") is not True:
                  return None

              user = pr.get("user")
              if not isinstance(user, dict):
                  return None
              if (
                  user.get("login") != "github-actions[bot]"
                  or user.get("type") != "Bot"
                  or user.get("id") != 41898282
              ):
                  return None

              head = pr.get("head")
              if not isinstance(head, dict):
                  return None
              ref = head.get("ref")
              if not isinstance(ref, str) or not ref.startswith("release/v"):
                  return None

              head_repo = head.get("repo")
              if not isinstance(head_repo, dict):
                  return None
              if head_repo.get("full_name") != repo:
                  return None
              if head_repo.get("fork") is not False:
                  return None

              version = ref[len("release/v") :].strip()
              if not semver_re.fullmatch(version):
                  return None

              base = pr.get("base")
              if not isinstance(base, dict) or base.get("ref") != "main":
                  return None

              title = pr.get("title")
              if not isinstance(title, str) or not title.startswith("release: v"):
                  return None

              if not isinstance(pr.get("merge_commit_sha"), str) or pr.get("merge_commit_sha") == "":
                  return None

              return version

          version = release_branch_version(pr)
          if version is None:
              print("skip: closed PR is not a merged bot-authored release PR")
              sys.exit(0)

          merge_commit_sha = pr.get("merge_commit_sha")
          if not isinstance(merge_commit_sha, str) or merge_commit_sha == "":
              sys.exit("release PR merge_commit_sha missing")

          print(f"dispatch: release publish for v{version}")
          subprocess.check_call(
              [
                   "gh",
                   "api",
                   "--method",
                   "POST",
                   f"repos/{repo}/dispatches",
                   "-f",
                   "event_type=release-publish-requested",
                   "-f",
                   f"client_payload[version]={version}",
                   "-f",
                   f"client_payload[tag]=v{version}",
                   "-f",
                   f"client_payload[release_ref]={merge_commit_sha}",
               ]
           )
           PY
