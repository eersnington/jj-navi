name: Publish Release

on:
  repository_dispatch:
    types: [release-publish-requested]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish again"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release-publish
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.preflight.outputs.should_publish }}
      release_ref: ${{ steps.preflight.outputs.release_ref }}
      version: ${{ steps.preflight.outputs.version }}
      tag: ${{ steps.preflight.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify main branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "::error::Run Publish Release from main"
            exit 1
          fi

      - name: Resolve publish target
        id: preflight
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          semver_re = re.compile(r"^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$")
          output_path = os.environ["GITHUB_OUTPUT"]

          def git(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True).strip()

          def is_ancestor(ancestor: str, descendant: str) -> bool:
              return subprocess.run(
                  ["git", "merge-base", "--is-ancestor", ancestor, descendant],
                  check=False,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              ).returncode == 0

          def gh_api(path: str) -> list[dict[str, object]]:
              output = subprocess.check_output(["gh", "api", "--paginate", "--slurp", path], text=True)
              pages = json.loads(output)
              items: list[dict[str, object]] = []
              for page in pages:
                  items.extend(page)
              return items

          def read_dispatch_payload() -> dict[str, object]:
              with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as handle:
                  event = json.load(handle)
              payload = event.get("client_payload")
              if not isinstance(payload, dict):
                  sys.exit("repository_dispatch client_payload missing")
              return payload

          def release_branch_version(pr: dict[str, object]) -> str | None:
              user = pr.get("user")
              if not isinstance(user, dict):
                  return None
              if (
                  user.get("login") != "github-actions[bot]"
                  or user.get("type") != "Bot"
                  or user.get("id") != 41898282
              ):
                  return None

              head = pr.get("head")
              if not isinstance(head, dict):
                  return None
              ref = head.get("ref")
              if not isinstance(ref, str) or not ref.startswith("release/v"):
                  return None

              head_repo = head.get("repo")
              if not isinstance(head_repo, dict):
                  return None
              if head_repo.get("full_name") != os.environ["GITHUB_REPOSITORY"]:
                  return None
              if head_repo.get("fork") is not False:
                  return None

              version = ref[len("release/v") :].strip()
              if not semver_re.fullmatch(version):
                  return None

              base = pr.get("base")
              if not isinstance(base, dict) or base.get("ref") != "main":
                  return None
              title = pr.get("title")
              if not isinstance(title, str) or not title.startswith("release: v"):
                  return None
              return version

          def write_outputs(values: dict[str, str]) -> None:
              with open(output_path, "a", encoding="utf-8") as handle:
                  for key, value in values.items():
                      handle.write(f"{key}={value}\n")

          event_name = os.environ["GITHUB_EVENT_NAME"]
          if event_name == "repository_dispatch":
              payload = read_dispatch_payload()
              version = payload.get("version")
              tag = payload.get("tag")
              release_ref = payload.get("release_ref")
              if not isinstance(version, str) or not semver_re.fullmatch(version):
                  sys.exit("repository_dispatch version missing or invalid")
              if tag != f"v{version}":
                  sys.exit("repository_dispatch tag mismatch")
              if not isinstance(release_ref, str) or not is_ancestor(release_ref, "HEAD"):
                  sys.exit("repository_dispatch release_ref missing or not on main")

              write_outputs(
                  {
                      "should_publish": "true",
                      "release_ref": release_ref,
                      "version": version,
                      "tag": tag,
                  }
              )
              sys.exit(0)

          if event_name != "workflow_dispatch":
              sys.exit(f"unsupported event: {event_name}")

          version = os.environ["RELEASE_VERSION"]
          if not semver_re.fullmatch(version):
              sys.exit(f"invalid semver: {version}")

          repo = os.environ["GITHUB_REPOSITORY"]
          closed_pulls = gh_api(f"repos/{repo}/pulls?state=closed&base=main&sort=updated&direction=desc&per_page=100")
          matches = []
          for pr in closed_pulls:
              if not pr.get("merged_at"):
                  continue
              if release_branch_version(pr) != version:
                  continue
              merge_commit_sha = pr.get("merge_commit_sha")
              if not isinstance(merge_commit_sha, str) or not is_ancestor(merge_commit_sha, "HEAD"):
                  continue
              matches.append(merge_commit_sha)

          if len(matches) != 1:
              sys.exit(f"expected exactly one merged release PR for v{version}")

          write_outputs(
              {
                  "should_publish": "true",
                  "release_ref": matches[0],
                  "version": version,
                  "tag": f"v{version}",
              }
          )
          PY

  test:
    needs: preflight
    if: needs.preflight.outputs.should_publish == 'true'
    uses: ./.github/workflows/test.yml
    with:
      checkout-ref: ${{ needs.preflight.outputs.release_ref }}

  build:
    needs: [preflight, test]
    if: needs.preflight.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-15
            rust_target: aarch64-apple-darwin
            deployment_target: "13.0"
          - platform: darwin-x64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            deployment_target: "13.0"
          - platform: linux-arm64
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            deployment_target: ""
          - platform: linux-x64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            deployment_target: ""
          - platform: linux-arm64-musl
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-musl
            deployment_target: ""
          - platform: linux-x64-musl
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            deployment_target: ""
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.release_ref }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Add Rust target
        if: runner.os != 'Linux'
        run: rustup target add "${{ matrix.rust_target }}"

      - name: Build binary
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cross build --locked --release --target "${{ matrix.rust_target }}"
          else
            cargo build --locked --release --target "${{ matrix.rust_target }}"
          fi

      - name: Verify macOS deployment target
        if: runner.os == 'macOS'
        run: |
          MIN_OS=$(otool -l "target/${{ matrix.rust_target }}/release/navi" | awk '
            $1 == "cmd" && $2 == "LC_BUILD_VERSION" { in_build = 1; next }
            in_build && $1 == "minos" { print $2; exit }
          ')
          if [ "$MIN_OS" != "${{ matrix.deployment_target }}" ]; then
            echo "::error::Expected macOS deployment target ${{ matrix.deployment_target }}, got $MIN_OS"
            exit 1
          fi

      - name: Stage artifact
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/build/${{ matrix.platform }}"
          mkdir -p "$ARTIFACT_DIR"
          install -m 755 "target/${{ matrix.rust_target }}/release/navi" "$ARTIFACT_DIR/navi"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}
          path: ${{ runner.temp }}/build/${{ matrix.platform }}
          if-no-files-found: error

  publish:
    needs: [preflight, test, build]
    if: needs.preflight.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: release

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.release_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release files
        run: cargo run --manifest-path xtask/Cargo.toml --bin navi-release -- validate "${{ needs.preflight.outputs.version }}"

      - name: Create release tag if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          RELEASE_REF="${{ needs.preflight.outputs.release_ref }}"
          if TAG_COMMIT=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.sha' 2>/dev/null); then
            if [ "$TAG_COMMIT" != "$RELEASE_REF" ]; then
              echo "::error::Tag $TAG already exists at $TAG_COMMIT, expected $RELEASE_REF"
              exit 1
            fi
            exit 0
          fi
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${TAG}" \
            -f sha="$RELEASE_REF" >/dev/null

      - name: Publish crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          LOG_PATH="$RUNNER_TEMP/cargo-publish.log"
          set +e
          cargo publish --locked 2>&1 | tee "$LOG_PATH"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if grep -qi "already uploaded\|already exists" "$LOG_PATH"; then
            echo "crate version already published, skipping"
            exit 0
          fi
          exit "$status"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Compute release metadata
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
            PRERELEASE="true"
          else
            DIST_TAG="latest"
            PRERELEASE="false"
          fi
          echo "DIST_TAG=$DIST_TAG" >> "$GITHUB_ENV"
          echo "PRERELEASE=$PRERELEASE" >> "$GITHUB_ENV"

      - name: Stage npm packages
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          ARTIFACTS_DIR="$RUNNER_TEMP/artifacts"
          NPM_STAGE_DIR="$RUNNER_TEMP/npm"
          rm -rf "$NPM_STAGE_DIR"
          mkdir -p "$NPM_STAGE_DIR"
          cp -R npm/jj-navi "$NPM_STAGE_DIR/jj-navi"
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64 linux-arm64-musl linux-x64-musl; do
            PLATFORM_DIR="$NPM_STAGE_DIR/$platform"
            node npm/scripts/generate-platform-package.mjs "$platform" "$VERSION" "$PLATFORM_DIR"
            install -m 755 "$ARTIFACTS_DIR/$platform/navi" "$PLATFORM_DIR/navi"
          done

      - name: Publish npm platform packages
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          NPM_STAGE_DIR="$RUNNER_TEMP/npm"
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64 linux-arm64-musl linux-x64-musl; do
            PACKAGE_NAME="jj-navi-$platform"
            if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
              echo "$PACKAGE_NAME@$VERSION already published, skipping"
              continue
            fi
            npm publish "$NPM_STAGE_DIR/$platform" --tag "$DIST_TAG" --provenance --access public
          done

      - name: Publish npm wrapper package
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          if npm view "jj-navi@$VERSION" version >/dev/null 2>&1; then
            echo "jj-navi@$VERSION already published, skipping"
            exit 0
          fi
          npm publish "$RUNNER_TEMP/npm/jj-navi" --tag "$DIST_TAG" --provenance --access public

      - name: Create release archives
        run: |
          ARTIFACTS_DIR="$RUNNER_TEMP/artifacts"
          STAGE_DIR="$RUNNER_TEMP/release-stage"
          RELEASE_DIR="$RUNNER_TEMP/release"
          rm -rf "$STAGE_DIR" "$RELEASE_DIR"
          mkdir -p "$STAGE_DIR" "$RELEASE_DIR"
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64 linux-arm64-musl linux-x64-musl; do
            mkdir -p "$STAGE_DIR/$platform"
            install -m 755 "$ARTIFACTS_DIR/$platform/navi" "$STAGE_DIR/$platform/navi"
            tar -C "$STAGE_DIR/$platform" -czf "$RELEASE_DIR/jj-navi-$platform.tar.gz" navi
          done

      - name: Generate checksums
        run: |
          RELEASE_DIR="$RUNNER_TEMP/release"
          (cd "$RELEASE_DIR" && sha256sum *.tar.gz > checksums-sha256.txt)

      - name: Write release notes
        run: cargo run --manifest-path xtask/Cargo.toml --bin navi-release -- notes "${{ needs.preflight.outputs.version }}" > "$RUNNER_TEMP/release/release-notes.md"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          RELEASE_DIR="$RUNNER_TEMP/release"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file "$RELEASE_DIR/release-notes.md"
            gh release upload "$TAG" "$RELEASE_DIR"/*.tar.gz "$RELEASE_DIR/checksums-sha256.txt" --clobber
            exit 0
          fi
          PRERELEASE_ARGS=()
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_ARGS+=(--prerelease)
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$RELEASE_DIR/release-notes.md" \
            "${PRERELEASE_ARGS[@]}" \
            "$RELEASE_DIR"/*.tar.gz \
            "$RELEASE_DIR/checksums-sha256.txt"
