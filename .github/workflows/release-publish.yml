name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-publish-${{ inputs.version }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  VERSION: ${{ inputs.version }}

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Verify main branch
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "::error::Run Publish Release from main"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release files
        run: node scripts/release/validate.mjs "$VERSION"

      - name: Ensure tag does not exist
        run: |
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi

      - name: Test
        run: cargo test

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            rust_target: aarch64-apple-darwin
            archive_name: jj-navi-darwin-arm64.tar.gz
          - platform: darwin-x64
            runner: macos-13
            rust_target: x86_64-apple-darwin
            archive_name: jj-navi-darwin-x64.tar.gz
          - platform: linux-arm64
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            archive_name: jj-navi-linux-arm64.tar.gz
          - platform: linux-x64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            archive_name: jj-navi-linux-x64.tar.gz
          - platform: linux-arm64-musl
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-musl
            archive_name: jj-navi-linux-arm64-musl.tar.gz
          - platform: linux-x64-musl
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            archive_name: jj-navi-linux-x64-musl.tar.gz
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Add Rust target
        if: runner.os != 'Linux'
        run: rustup target add "${{ matrix.rust_target }}"

      - name: Build binary
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cross build --locked --release --target "${{ matrix.rust_target }}"
          else
            cargo build --locked --release --target "${{ matrix.rust_target }}"
          fi

      - name: Package artifact
        run: |
          mkdir -p "dist/${{ matrix.platform }}"
          cp "target/${{ matrix.rust_target }}/release/navi" "dist/${{ matrix.platform }}/navi"
          tar -C "dist/${{ matrix.platform }}" -czf "dist/${{ matrix.platform }}/${{ matrix.archive_name }}" navi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist/${{ matrix.platform }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute release metadata
        run: |
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            DIST_TAG="latest"
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi
          echo "DIST_TAG=$DIST_TAG" >> "$GITHUB_ENV"

      - name: Prepare npm platform packages
        run: |
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64 linux-arm64-musl linux-x64-musl; do
            node npm/scripts/generate-platform-package.mjs "$platform" "$VERSION"
            cp "dist/$platform/navi" "npm/$platform/navi"
          done

      - name: Publish crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          cargo publish --locked 2>&1 | tee cargo-publish.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ] && ! grep -qi "already uploaded\|already exists" cargo-publish.log; then
            exit "$status"
          fi

      - name: Publish npm platform packages
        run: |
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64 linux-arm64-musl linux-x64-musl; do
            package_name="jj-navi-$platform"
            if npm view "$package_name@$VERSION" version >/dev/null 2>&1; then
              continue
            fi
            npm publish "npm/$platform" --tag "$DIST_TAG" --provenance --access public
          done

      - name: Publish npm wrapper package
        run: |
          if ! npm view "jj-navi@$VERSION" version >/dev/null 2>&1; then
            npm publish npm/jj-navi --tag "$DIST_TAG" --provenance --access public
          fi

      - name: Build checksums
        run: |
          mkdir -p release-artifacts
          cp dist/*/*.tar.gz release-artifacts/
          (cd release-artifacts && sha256sum *.tar.gz > checksums-sha256.txt)

      - name: Write release notes
        run: node scripts/release/notes.mjs "$VERSION" > release-artifacts/release-notes.md

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_args=()
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi
          gh release create "v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --notes-file release-artifacts/release-notes.md \
            "${prerelease_args[@]}" \
            release-artifacts/*.tar.gz \
            release-artifacts/checksums-sha256.txt
