name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
        type: string
      ref:
        description: "Commit, tag, or branch to publish"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-publish-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.pull_request.merge_commit_sha }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  validate:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.pull_request.merged == true &&
          github.event.pull_request.user.login == 'github-actions[bot]' &&
          startsWith(github.event.pull_request.head.ref, 'release/v') &&
          startsWith(github.event.pull_request.title, 'release: v') &&
          contains(github.event.pull_request.body, '<!-- navi-release:release-pr -->')
        )
      }}
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.release_ref.outputs.ref }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Resolve release ref
        id: release_ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.pull_request.merge_commit_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_ref.outputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(cargo run --quiet --manifest-path xtask/Cargo.toml --bin navi-release -- current-version)"
          fi
          VERSION="${VERSION#v}"
          if ! npx --yes semver "$VERSION" > /dev/null 2>&1; then
            echo "::error::Invalid semver: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release files
        run: cargo run --manifest-path xtask/Cargo.toml --bin navi-release -- validate "${{ steps.version.outputs.version }}"

      - name: Check tag state
        run: |
          git fetch --force --tags origin
          TAG="${{ steps.version.outputs.tag }}"
          EXPECTED_SHA="$(git rev-parse HEAD)"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            if [ "$TAG_COMMIT" != "$EXPECTED_SHA" ]; then
              echo "::error::Tag $TAG already exists at $TAG_COMMIT, expected $EXPECTED_SHA"
              exit 1
            fi
          fi

  test:
    needs: validate
    uses: ./.github/workflows/test.yml
    with:
      ref: ${{ needs.validate.outputs.release_ref }}

  tag:
    needs: [validate, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_ref: ${{ steps.release.outputs.release_ref }}
      version: ${{ needs.validate.outputs.version }}
      tag: ${{ needs.validate.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.release_ref }}
          fetch-depth: 0

      - name: Create release tag if needed
        id: release
        run: |
          git fetch --force --tags origin
          TAG="${{ needs.validate.outputs.tag }}"
          EXPECTED_SHA="$(git rev-parse HEAD)"
          echo "release_ref=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            if [ "$TAG_COMMIT" != "$EXPECTED_SHA" ]; then
              echo "::error::Tag $TAG already exists at $TAG_COMMIT, expected $EXPECTED_SHA"
              exit 1
            fi
            exit 0
          fi
          git tag "$TAG" "$EXPECTED_SHA"
          git push origin "$TAG"

  build:
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-15
            rust_target: aarch64-apple-darwin
            deployment_target: "13.0"
          - platform: darwin-x64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            deployment_target: "13.0"
          - platform: linux-arm64
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            deployment_target: ""
          - platform: linux-x64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            deployment_target: ""
          - platform: linux-arm64-musl
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-musl
            deployment_target: ""
          - platform: linux-x64-musl
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            deployment_target: ""
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.release_ref }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Add Rust target
        if: runner.os != 'Linux'
        run: rustup target add "${{ matrix.rust_target }}"

      - name: Build binary
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cross build --locked --release --target "${{ matrix.rust_target }}"
          else
            cargo build --locked --release --target "${{ matrix.rust_target }}"
          fi

      - name: Verify macOS deployment target
        if: runner.os == 'macOS'
        run: |
          MIN_OS=$(otool -l "target/${{ matrix.rust_target }}/release/navi" | awk '
            $1 == "cmd" && $2 == "LC_BUILD_VERSION" { in_build = 1; next }
            in_build && $1 == "minos" { print $2; exit }
          ')
          if [ "$MIN_OS" != "${{ matrix.deployment_target }}" ]; then
            echo "::error::Expected macOS deployment target ${{ matrix.deployment_target }}, got $MIN_OS"
            exit 1
          fi

      - name: Stage artifact
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/build/${{ matrix.platform }}"
          mkdir -p "$ARTIFACT_DIR"
          install -m 755 "target/${{ matrix.rust_target }}/release/navi" "$ARTIFACT_DIR/navi"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}
          path: ${{ runner.temp }}/build/${{ matrix.platform }}
          if-no-files-found: error

  publish-crates:
    needs: tag
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.release_ref }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          LOG_PATH="$RUNNER_TEMP/cargo-publish.log"
          set +e
          cargo publish --locked 2>&1 | tee "$LOG_PATH"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if grep -qi "already uploaded\|already exists" "$LOG_PATH"; then
            echo "crate version already published, skipping"
            exit 0
          fi
          exit "$status"

  publish-npm:
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: release

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.release_ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Compute release metadata
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "DIST_TAG=$DIST_TAG" >> "$GITHUB_ENV"

      - name: Stage npm packages
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          ARTIFACTS_DIR="$RUNNER_TEMP/artifacts"
          NPM_STAGE_DIR="$RUNNER_TEMP/npm"
          rm -rf "$NPM_STAGE_DIR"
          mkdir -p "$NPM_STAGE_DIR"
          cp -R npm/jj-navi "$NPM_STAGE_DIR/jj-navi"
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64 linux-arm64-musl linux-x64-musl; do
            PLATFORM_DIR="$NPM_STAGE_DIR/$platform"
            node npm/scripts/generate-platform-package.mjs "$platform" "$VERSION" "$PLATFORM_DIR"
            install -m 755 "$ARTIFACTS_DIR/$platform/navi" "$PLATFORM_DIR/navi"
          done

      - name: Publish npm platform packages
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          NPM_STAGE_DIR="$RUNNER_TEMP/npm"
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64 linux-arm64-musl linux-x64-musl; do
            PACKAGE_NAME="jj-navi-$platform"
            if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
              echo "$PACKAGE_NAME@$VERSION already published, skipping"
              continue
            fi
            npm publish "$NPM_STAGE_DIR/$platform" --tag "$DIST_TAG" --provenance --access public
          done

      - name: Publish npm wrapper package
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          if npm view "jj-navi@$VERSION" version >/dev/null 2>&1; then
            echo "jj-navi@$VERSION already published, skipping"
            exit 0
          fi
          npm publish "$RUNNER_TEMP/npm/jj-navi" --tag "$DIST_TAG" --provenance --access public

  github-release:
    needs: [tag, build, publish-crates, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.release_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Compute release metadata
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Create release archives
        run: |
          ARTIFACTS_DIR="$RUNNER_TEMP/artifacts"
          STAGE_DIR="$RUNNER_TEMP/release-stage"
          RELEASE_DIR="$RUNNER_TEMP/release"
          rm -rf "$STAGE_DIR" "$RELEASE_DIR"
          mkdir -p "$STAGE_DIR" "$RELEASE_DIR"
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64 linux-arm64-musl linux-x64-musl; do
            mkdir -p "$STAGE_DIR/$platform"
            install -m 755 "$ARTIFACTS_DIR/$platform/navi" "$STAGE_DIR/$platform/navi"
            tar -C "$STAGE_DIR/$platform" -czf "$RELEASE_DIR/jj-navi-$platform.tar.gz" navi
          done

      - name: Generate checksums
        run: |
          RELEASE_DIR="$RUNNER_TEMP/release"
          (cd "$RELEASE_DIR" && sha256sum *.tar.gz > checksums-sha256.txt)

      - name: Write release notes
        run: cargo run --manifest-path xtask/Cargo.toml --bin navi-release -- notes "${{ needs.tag.outputs.version }}" > "$RUNNER_TEMP/release/release-notes.md"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          RELEASE_DIR="$RUNNER_TEMP/release"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file "$RELEASE_DIR/release-notes.md"
            gh release upload "$TAG" "$RELEASE_DIR"/*.tar.gz "$RELEASE_DIR/checksums-sha256.txt" --clobber
            exit 0
          fi
          PRERELEASE_ARGS=()
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_ARGS+=(--prerelease)
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$RELEASE_DIR/release-notes.md" \
            "${PRERELEASE_ARGS[@]}" \
            "$RELEASE_DIR"/*.tar.gz \
            "$RELEASE_DIR/checksums-sha256.txt"
