name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install jj
        run: cargo install --locked jj-cli

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check xtask formatting
        run: cargo fmt --manifest-path xtask/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy xtask
        run: cargo clippy --manifest-path xtask/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Test xtask
        run: cargo test --manifest-path xtask/Cargo.toml

      - name: Validate release files
        run: cargo run --manifest-path xtask/Cargo.toml --bin navi-release -- validate

      - name: Smoke test fragment command
        run: cargo run --manifest-path xtask/Cargo.toml --bin navi-release -- "smoke test fragment" -s ci --dry-run
