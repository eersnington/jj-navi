name: Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:
    inputs:
      ref:
        required: false
        type: string

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install jj
        run: cargo install --locked jj-cli

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check xtask formatting
        run: cargo fmt --manifest-path xtask/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy xtask
        run: cargo clippy --manifest-path xtask/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Test xtask
        run: cargo test --manifest-path xtask/Cargo.toml

      - name: Validate release files
        run: cargo run --manifest-path xtask/Cargo.toml --bin navi-release -- validate

      - name: Check npm wrapper README sync
        run: |
          OUTPUT_PATH="$RUNNER_TEMP/npm-wrapper-readme.md"
          node npm/scripts/sync-wrapper-readme.mjs "$OUTPUT_PATH"
          cmp README.md "$OUTPUT_PATH"
          cmp README.md npm/jj-navi/README.md

      - name: Smoke test current version command
        run: cargo run --manifest-path xtask/Cargo.toml --bin navi-release -- current-version

      - name: Smoke test PR validation command
        run: |
          EVENT_PATH="$RUNNER_TEMP/release-event.json"
          python - <<'PY' "$EVENT_PATH"
          import json
          import sys

          path = sys.argv[1]
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(
                  {
                      "pull_request": {
                          "number": 1,
                          "title": "smoke test release metadata",
                          "labels": [{"name": "release:patch"}],
                      }
                  },
                  handle,
              )
          PY
          cargo run --manifest-path xtask/Cargo.toml --bin navi-release -- pr validate --event-path "$EVENT_PATH"

      - name: Smoke test npm platform package generation
        run: |
          OUTPUT_DIR="$RUNNER_TEMP/npm-platform"
          node npm/scripts/generate-platform-package.mjs linux-x64 0.0.0-test "$OUTPUT_DIR"
          test -f "$OUTPUT_DIR/package.json"
          test -f "$OUTPUT_DIR/README.md"
